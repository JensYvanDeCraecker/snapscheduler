name: Build and push to GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: snapscheduler version to build (without leading v)
        required: true
        default: "3.5.0"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: v${{ inputs.version }}   # build the tagged release, not the fork default branch

    - name: Compute image name
      id: img
      run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/snapscheduler" >> "$GITHUB_OUTPUT"

    - name: Compute build date
      id: meta
      run: echo "builddate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push multi-arch image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.img.outputs.image }}:${{ inputs.version }}
        build-args: |
          version=v${{ inputs.version }}
          builddate=${{ steps.meta.outputs.builddate }}
